- id: case_frontier_lab_policy
  profile:
    nl: |
      I run policy at a frontier AI lab building general-purpose foundation
      models. My day-to-day is owning our positions on US export controls
      (BIS chip rules, AI diffusion framework, license exceptions for
      training compute), federal compute thresholds and reporting
      requirements (the 10^26 FLOPs line, NIST/AISI evals mandates),
      preemption fights between SB 1047-style state bills and any federal
      framework, and the EU AI Act GPAI obligations + Code of Practice
      implementing acts. I also care about how the open-weights debate
      shakes out — release policy, dual-use research norms, and any
      enforcement against open-weights distributors. Bring me anything
      that materially shifts our compliance burden, our model release
      decisions, or our compute roadmap.
    structured_overrides:
      jurisdictions: [US-Federal, EU]
      recency_days: 30
      risk_tolerance: actionable_only
  # AI cannot grade itself against AI-written ground truth — Aden fills these:
  expected_top_activities: []  # ADEN: paste activity_ids that should appear in top-15 after running once
  expected_topics_surfaced: []  # ADEN: paste topic_ids you'd expect to see chips for
  expected_action_themes: []  # ADEN: paste 3-5 action substrings you'd expect (e.g. "file comment on", "brief leadership on")

